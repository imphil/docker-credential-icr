name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    container:
        image: ${{ matrix.platform.container }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          - name: Linux x86_64
            os: ubuntu-latest
            container: almalinux:8
            target: x86_64-unknown-linux-gnu
            artifact_name: docker-credential-icr-linux-x86_64
            binary_name: docker-credential-icr

          # macOS Intel
          - name: macOS x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
            artifact_name: docker-credential-icr-macos-x86_64
            binary_name: docker-credential-icr

          # macOS Apple Silicon
          - name: macOS ARM64
            os: macos-26
            target: aarch64-apple-darwin
            artifact_name: docker-credential-icr-macos-arm64
            binary_name: docker-credential-icr

          # Windows
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: docker-credential-icr-windows-x86_64
            binary_name: docker-credential-icr.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          dnf install -y gcc gcc-c++ make dbus-devel pkgconf-pkg-config

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }}
          if-no-files-found: error
