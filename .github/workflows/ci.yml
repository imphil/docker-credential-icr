name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    container:
      image: ${{ matrix.platform.container }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux x86_64
          # Build on RHEL8 for glibc 2.28.
          - name: Linux x86_64
            os: ubuntu-latest
            container: almalinux:8
            target: x86_64-unknown-linux-gnu
            artifact_name: docker-credential-icr-linux-x86_64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-linux-x86_64.tar.gz

          # macOS Intel
          - name: macOS x86_64
            os: macos-26-intel
            target: x86_64-apple-darwin
            artifact_name: docker-credential-icr-macos-x86_64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-macos-x86_64.tar.gz

          # macOS Apple Silicon
          - name: macOS ARM64
            os: macos-26
            target: aarch64-apple-darwin
            artifact_name: docker-credential-icr-macos-arm64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-macos-arm64.tar.gz

          # Windows
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: docker-credential-icr-windows-x86_64
            binary_name: docker-credential-icr.exe
            asset_name: docker-credential-icr-windows-x86_64.zip

    steps:
      # Install dependencies before doing the code checkout to have git available
      # for it.
      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest' 
        # We're in a RHEL container!
        run: |
          dnf install -y git gcc gcc-c++ make dbus-devel pkgconf-pkg-config

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          # Check if this is a tagged release
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # For tagged releases, use the tag version
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # For non-releases, append git hash to cargo version
            VERSION="${CARGO_VERSION}-${{ github.sha }}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          echo "Determined version: ${VERSION}"

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.platform.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.platform.target }}

# -      - name: Upload artifact
# -        uses: actions/upload-artifact@v7
# -        with:
# -          name: ${{ matrix.platform.artifact_name }}
# -          path: target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }}
# -          if-no-files-found: error

      - name: Prepare release asset (Linux)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSET_NAME="docker-credential-icr-${VERSION}-${{ matrix.platform.target }}.tar.gz"
          cd target/${{ matrix.platform.target }}/release
          tar czf "../../../${ASSET_NAME}" ${{ matrix.platform.binary_name }}
          cd ../../..
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Prepare release asset (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assetName = "docker-credential-icr-${version}-${{ matrix.platform.target }}.zip"
          cd target/${{ matrix.platform.target }}/release
          Compress-Archive -Path ${{ matrix.platform.binary_name }} -DestinationPath "../../../${assetName}"
          cd ../../..
          echo "ASSET_NAME=${assetName}" >> $env:GITHUB_ENV

      - name: Prepare pre-release asset (Unix)
        if: "!startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSET_NAME="docker-credential-icr-${VERSION}-${{ matrix.platform.target }}.tar.gz"
          cd target/${{ matrix.platform.target }}/release
          tar czf "../../../${ASSET_NAME}" ${{ matrix.platform.binary_name }}
          cd ../../..
          echo "ASSET_NAME=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Prepare pre-release asset (Windows)
        if: "!startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'"
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assetName = "docker-credential-icr-${version}-${{ matrix.platform.target }}.zip"
          cd target/${{ matrix.platform.target }}/release
          Compress-Archive -Path ${{ matrix.platform.binary_name }} -DestinationPath "../../../${assetName}"
          cd ../../..
          echo "ASSET_NAME=${assetName}" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Move artifacts to release directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
