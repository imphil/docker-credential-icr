name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: docker-credential-icr-linux-x86_64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-linux-x86_64.tar.gz
          
          # macOS Intel
          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact_name: docker-credential-icr-macos-x86_64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-macos-x86_64.tar.gz
          
          # macOS Apple Silicon
          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_name: docker-credential-icr-macos-arm64
            binary_name: docker-credential-icr
            asset_name: docker-credential-icr-macos-arm64.tar.gz
          
          # Windows
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: docker-credential-icr-windows-x86_64
            binary_name: docker-credential-icr.exe
            asset_name: docker-credential-icr-windows-x86_64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Prepare asset (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf "../../../${{ matrix.platform.asset_name }}" ${{ matrix.platform.binary_name }}
          cd ../../..

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.platform.target }}/release
          Compress-Archive -Path ${{ matrix.platform.binary_name }} -DestinationPath "../../../${{ matrix.platform.asset_name }}"
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.asset_name }}
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Move artifacts to release directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

